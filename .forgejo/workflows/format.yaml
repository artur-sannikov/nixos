name: Check nix code and format
on:
  workflow_dispatch:
  push:
    branches:
      - main
      - devel
jobs:
  format:
    name: Formatting
    runs-on: debian-latest
    steps:
      - name: Install Lix
        uses: actions/install-lix@v1
      - name: Checkout flake
        uses: actions/checkout@v7
      - name: Check formatting of Nix code
        run: nix run nixpkgs#nixfmt-tree -- --ci .
      - name: Run statix
        run: nix run nixpkgs#statix -- check --ignore "_hardware-configuration.nix" .
