name: Build systems and cache on attic
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 6"
jobs:
  build-cache:
    name: Build systems and push to cache
    runs-on: debian-latest
    strategy:
      matrix:
        machine: ["desktop", "ty", "tuxedo"]
    steps:
      - name: Install Lix
        uses: actions/install-lix@v1
      - name: Checkout flake
        uses: actions/checkout@v6
        with:
          ref: devel
      - name: Build
        run: |
          nix build -L .#nixosConfigurations.${{ matrix.machine }}.config.system.build.toplevel  && echo "Success"
